<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Task Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard-container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="sidebar-logo">
            TASK MANAGER
        </div>

        <ul class="sidebar-menu">
            <li class="active">🏠 Dashboard</li>
            <li>📋 All Tasks</li>
            <li>➕ Add Task</li>
            <li>✅ Completed</li>
            <li>👤 Profile</li>
            <li>🚪 Logout</li>
        </ul>

    </aside>

    <!-- Main Content -->

    <main class="dashboard-main">

        <div class="dashboard-header">

            <h1>Dashboard</h1>

            <div class="header-right">

                <span class="user-name">
                    sandeep seervi
                </span>

                <button class="add-task-btn">
                    + Add Task
                </button>

            </div>

        </div>

        <!-- Task List -->

        <div class="tasks-container">

            <div class="task-card">

                <div>
                    <h3>Study for React Exam</h3>
                    <p>Due: 25 May 2024</p>
                </div>

                <div class="task-actions">
                    <button class="edit-btn">Edit</button>
                    <button class="delete-btn">Delete</button>
                </div>

            </div>

            <div class="task-card">

                <div>
                    <h3>Complete Internship Project</h3>
                    <p>Due: 28 May 2024</p>
                </div>

                <div class="task-actions">
                    <button class="edit-btn">Edit</button>
                    <button class="delete-btn">Delete</button>
                </div>

            </div>

            <div class="task-card">

                <div>
                    <h3>Buy Groceries</h3>
                    <p>Due: 20 May 2024</p>
                </div>

                <div class="task-actions">
                    <button class="edit-btn">Edit</button>
                    <button class="delete-btn">Delete</button>
                </div>

            </div>

            <div class="task-card">

                <div>
                    <h3>Read a Book</h3>
                    <p>Due: 30 May 2024</p>
                </div>

                <div class="task-actions">
                    <button class="edit-btn">Edit</button>
                    <button class="delete-btn">Delete</button>
                </div>

            </div>

        </div>

    </main>

</div>

<script src="js/script.js"></script>

</body>
</html>
